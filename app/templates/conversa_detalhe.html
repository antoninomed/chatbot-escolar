{% extends "base.html" %}
{% block title %}Conversa{% endblock %}
{% block page_title %}Conversa com {{ telefone }}{% endblock %}

{% block content %}
<div class="chat-wrapper">
  <div id="chat-content">
    {% include "partials/conversa_mensagens.html" %}
  </div>

  <div class="chat-reply-box">
    <form method="post" action="/admin/conversas/{{ telefone }}/responder" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label fw-semibold">Responder como secretaria</label>
        <textarea
          name="mensagem"
          class="form-control"
          rows="4"
          placeholder="Digite a resposta para o responsável..."
        ></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Anexar arquivo</label>
        <input
          type="file"
          name="arquivo"
          class="form-control"
          accept="image/*,application/pdf,audio/*,video/*,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt"
        >
        <div class="form-text">
          Você pode enviar imagem, PDF, áudio, vídeo e documentos.
        </div>
      </div>

      <div class="d-flex gap-2 flex-wrap">
        <button type="submit" class="btn btn-danger">
          Enviar resposta
        </button>

        <button
          type="submit"
          name="acao"
          value="finalizar"
          class="btn btn-outline-secondary"
        >
          Finalizar atendimento
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  let ultimaQuantidade = 0;
  let atualizando = false;

  function getChatBody() {
    return document.getElementById("chat-body");
  }

  function contarMensagens() {
    const chatBody = getChatBody();
    if (!chatBody) return 0;
    return chatBody.querySelectorAll(".chat-row").length;
  }

  function scrollToBottom() {
    const chatBody = getChatBody();
    if (chatBody) {
      chatBody.scrollTop = chatBody.scrollHeight;
    }
  }

  function estaPertoDoFim() {
    const chatBody = getChatBody();
    if (!chatBody) return true;
    return (chatBody.scrollHeight - chatBody.scrollTop - chatBody.clientHeight) < 80;
  }

  async function atualizarMensagens() {
    if (atualizando) return;
    atualizando = true;

    try {
      const response = await fetch("/admin/conversas/{{ telefone }}/mensagens", {
        method: "GET",
        headers: {
          "X-Requested-With": "XMLHttpRequest",
          "Cache-Control": "no-cache"
        }
      });

      if (!response.ok) {
        atualizando = false;
        return;
      }

      const html = await response.text();
      const temp = document.createElement("div");
      temp.innerHTML = html;

      const novoChatBody = temp.querySelector("#chat-body");
      if (!novoChatBody) {
        atualizando = false;
        return;
      }

      const novaQuantidade = novoChatBody.querySelectorAll(".chat-row").length;
      const estavaPertoDoFim = estaPertoDoFim();

      const container = document.getElementById("chat-content");
      if (!container) {
        atualizando = false;
        return;
      }

      if (novaQuantidade > ultimaQuantidade && document.hidden) {
        document.title = "Nova mensagem • Conversa";
      }

      container.innerHTML = html;
      ultimaQuantidade = novaQuantidade;

      if (estavaPertoDoFim) {
        scrollToBottom();
      }
    } catch (error) {
      console.error("Erro ao atualizar mensagens:", error);
    } finally {
      atualizando = false;
    }
  }

  window.addEventListener("load", () => {
    ultimaQuantidade = contarMensagens();
    scrollToBottom();
    setInterval(atualizarMensagens, 3000);
  });

  window.addEventListener("focus", () => {
    document.title = "Conversa";
  });

  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
      document.title = "Conversa";
    }
  });
</script>
{% endblock %}
