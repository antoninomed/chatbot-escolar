<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/admin.css" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="brand-badge large">TZ</div>
        <h2>Tio Zé Admin</h2>
        <p>Faça login para acessar o painel do chatbot escolar</p>
      </div>

      {% if erro %}
        <div class="alert alert-danger">{{ erro }}</div>
      {% endif %}

      <form method="post" action="/admin/login">
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input type="email" name="email" class="form-control form-control-lg" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Senha</label>
          <input type="password" name="senha" class="form-control form-control-lg" required>
        </div>
        <button type="submit" class="btn btn-danger btn-lg w-100">Entrar</button>
      </form>
    </div>
  </div>
</body>
</html>
